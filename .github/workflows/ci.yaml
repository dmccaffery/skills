# Caller for the reusable CI workflow. It owns the push/pull_request triggers; the
# reusable workflow runs the canonical Makefile gates (lint, build, test) as one
# job each and sets up only the toolchains this repo has — setup-go from go.work
# (the tools-only module `make lint` drives via `go tool`) and setup-node from
# package.json (.node-version pins the version). `make build` is a no-op here; the
# real work is `make lint` (markdownlint + evolve Tier 0 --strict + eval-JSON +
# license + install.sh parse) and `make test` (evolve checks + report --check).
#
# coverage: false — this is a skills library, it emits no coverage, so the Codecov
# upload job is skipped.
#
# Keep `name: ci`: the merge.yaml and dependabot-merge.yaml callers key their
# workflow_run triggers on this workflow's name.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@27fe5361320037b035595ecbeefe64b06fd54178 # v4.0.4
    with:
      coverage: false # skills library — no coverage to upload
