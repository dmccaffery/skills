# Caller for Dependabot auto-merge. When a Dependabot PR's CI finishes green the
# reusable workflow approves it if it is a minor or patch update, then fast-forwards
# it into the base branch (preserving Dependabot's signed commits, via the same
# `ff-merge` action as the `/merge` flow). Major updates are never approved, so they
# wait for a human.
#
# Requires .github/dependabot.yaml (present) so Dependabot opens PRs, and branch
# protection that requires PR review (so the approval sets the review decision) —
# the same assumption as the `/merge` flow.
#
# Prerequisites (one-time, org-wide — see bitwise-media-group/ff-merge):
#   - org variable FF_MERGE_CLIENT_ID and org secret FF_MERGE_PRIVATE_KEY
#   - the "FF Merge" App installed on this repo and in the ruleset bypass list

name: Dependabot auto-merge

# Just workflow_run — the reusable workflow approves and fast-forwards once CI is
# green, reading the minor/patch-vs-major policy from Dependabot's signed commit.
# This event does NOT attach a check run to the PR, so it leaves no skipped-job
# clutter (and needs no pull_request_target). check_suite is NOT usable — GitHub
# does not fire it for a repo's own Actions CI. `ci` is this repo's only required
# PR check (evals.yaml is workflow_dispatch-only), so it is the single workflow that
# must finish green before the merge attempt.
on:
  workflow_run:
    workflows: [ci]
    types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  auto-merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/dependabot-merge.yaml@27fe5361320037b035595ecbeefe64b06fd54178 # v4.0.4
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
      # update-types: '["version-update:semver-patch", "version-update:semver-minor"]' # default
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
