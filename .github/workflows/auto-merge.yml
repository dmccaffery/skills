# Caller for the set-and-forget companion to merge.yaml. A maintainer arms a PR
# once — comments `/auto-merge`, or adds the `auto-merge` label — and the reusable
# workflow fast-forwards it automatically as soon as it is approved and every
# required check is green, using the same signature-preserving `ff-merge` action
# as the `/merge` flow. `/merge` merges now; `/auto-merge` merges when ready.
# Remove the label to cancel.
#
# Fork PRs: only `issue_comment` and `workflow_run` get base-context secrets on a
# fork, so the `pull_request` (labeled) and `pull_request_review` jobs are gated to
# same-repo PRs by the reusable workflow. Arm a fork PR with the `/auto-merge`
# comment; it merges via that comment's immediate attempt or `workflow_run` once
# CI is green.
#
# Requires branch protection that requires PR review (so the approval sets the
# review decision) — the same assumption as the `/merge` flow.
#
# Prerequisites (one-time, org-wide — see bitwise-media-group/ff-merge):
#   - org variable FF_MERGE_CLIENT_ID and org secret FF_MERGE_PRIVATE_KEY
#   - the "FF Merge" App installed on this repo and in the ruleset bypass list

name: Auto-merge

# All four triggers are required; each is handled by one job in the reusable
# workflow. issue_comment + pull_request(labeled) arm the PR;
# pull_request_review(approved) and workflow_run(completed) attempt the merge once
# the state changes. `ci` is this repo's only required PR check (evals.yml is
# workflow_dispatch-only), so it is the single workflow that must finish green
# before a merge; ff-merge re-verifies all checks regardless. None of these run PR
# code; the reusable workflow only mints a token and calls the API.
on:
    issue_comment:
        types: [created]
    pull_request:
        types: [labeled]
    pull_request_review:
        types: [submitted]
    workflow_run:
        workflows: [ci]
        types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
    auto-merge:
        uses: bitwise-media-group/github-workflows/.github/workflows/auto-merge.yaml@v1
        with:
            app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
            # label: auto-merge    # default — the label that arms auto-merge
            # command: /auto-merge # default — the comment that arms auto-merge
        secrets:
            app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
