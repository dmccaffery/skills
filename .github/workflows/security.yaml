# Caller for the reusable CodeQL security analysis. This marketplace ships markdown
# skills + JSON manifests; its only first-class executable surface is the GitHub
# Actions workflows, so the scan is pinned to the `actions` language (build-free)
# via the `languages` input. That override skips the reusable's root detection,
# which would otherwise add an empty javascript-typescript leg for the tooling-only
# package.json (prettier/markdownlint) — there is no first-party JS/TS to scan. The
# Go files under plugins/ are out-of-tree eval fixtures with no root build graph
# (there is no root go.mod), so no go leg either.
#
# codeql-config.yaml (security-extended) is passed through unchanged.
name: Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "28 20 * * 4"

# ceiling for the reusable workflow's analyze job
permissions:
  # upload analysis results to code scanning
  security-events: write
  # fetch internal or private CodeQL packs
  packages: read
  # only required for workflows in private repositories
  actions: read
  # check out the repository
  contents: read

jobs:
  analyze:
    uses: bitwise-media-group/github-workflows/.github/workflows/security.yaml@27fe5361320037b035595ecbeefe64b06fd54178 # v4.0.4
    with:
      languages: actions # pin the matrix; skip root detection (no first-party JS/TS or Go)
      config-file: ./.github/codeql/codeql-config.yaml
