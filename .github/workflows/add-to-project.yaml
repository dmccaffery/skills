# MANAGED FILE — do not edit in a consuming repo.
#
# This is the canonical caller that `org-config.sh workflows-sync` fans out to
# `.github/workflows/add-to-project.yaml` in every non-archived org repo. Edit it
# here in github-settings and re-run the sync; a hand-edit in a consuming repo is
# overwritten on the next sync.
#
# When an issue is opened it is added to the shared org "Roadmap" project so every
# repo's issues collect in one board. The reusable workflow mints a short-lived
# "Project Sync" GitHub App token (org projects write; issues/PRs read) — GITHUB_TOKEN
# cannot write an org-level project — and hands it to actions/add-to-project.
#
# Org prerequisites: the "Project Sync" App installed on all repositories, exposed as
# the ADD_TO_PROJECT_CLIENT_ID variable + ADD_TO_PROJECT_PRIVATE_KEY secret.

name: Add to Project

on:
  issues:
    types: [opened]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  add:
    uses: bitwise-media-group/github-workflows/.github/workflows/add-to-project.yaml@2f3418bdbc1e4c51b0504b736a75d66f09bebe6a # v4.1.0
    with:
      project-url: https://github.com/orgs/bitwise-media-group/projects/1
      app-client-id: ${{ vars.ADD_TO_PROJECT_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.ADD_TO_PROJECT_PRIVATE_KEY }}
