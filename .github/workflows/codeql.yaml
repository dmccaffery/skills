# CodeQL for this marketplace. The repo ships markdown skills + JSON manifests;
# its only first-class executable surface is the GitHub Actions workflows, so the
# scan targets just the `actions` language (build-free). The Go files under
# plugins/ are out-of-tree eval fixtures with no root build graph, and there is no
# JS/TS, so neither org codeql-<lang> reusable fits — this inlines the analysis,
# mirroring the codeql-* reusables' pinned actions, permissions, and triggers.
name: codeql

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: "28 20 * * 4"

# granted per job
permissions: {}

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: ubuntu-latest
        permissions:
            # upload analysis results to code scanning
            security-events: write
            # fetch internal or private CodeQL packs
            packages: read
            # only required for workflows in private repositories
            actions: read
            # check out the repository
            contents: read

        strategy:
            fail-fast: false
            matrix:
                language: [actions]
        steps:
            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Initialize CodeQL
              uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
              with:
                  languages: ${{ matrix.language }}
                  build-mode: none
                  config-file: ./.github/codeql/codeql-config.yaml

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
              with:
                  category: "/language:${{ matrix.language }}"
