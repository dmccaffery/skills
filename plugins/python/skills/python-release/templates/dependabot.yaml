# Dependabot config — save as .github/dependabot.yaml. Daily checks with a
# 7-day cooldown; minor and patch bumps are grouped into one PR per ecosystem.
# `uv` covers pyproject.toml + uv.lock (runtime and dev-group dependencies);
# `github-actions` keeps the workflow SHA pins fresh. Add docker (and others)
# as the repo grows those ecosystems — see reference.md.
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      all-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      all-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
