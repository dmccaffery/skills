# GoReleaser config — save as .goreleaser.yaml at the repo root and replace the
# `myapp` and OWNER/REPO placeholders. Cut a release by pushing a vX.Y.Z tag (CI
# runs `goreleaser release`); build locally without publishing via `make snapshot`.
#
# Produces cross-platform binary archives + checksums + SBOMs, and multi-arch
# container images pushed to GitHub Container Registry. SBOMs are generated by
# the syft pinned in tools/go.mod (run via `go tool`, no PATH setup); multi-arch
# images need docker buildx.
version: 2

project_name: myapp

before:
  hooks:
    - go mod tidy

builds:
  - id: myapp
    main: ./cmd/myapp
    binary: myapp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/OWNER/REPO/internal/version.Version={{ .Version }}
      - -X github.com/OWNER/REPO/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/OWNER/REPO/internal/version.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: myapp
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Ship the LICENSE alongside the binary (explicit, not relying on defaults).
    files:
      - LICENSE

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive
    # syft is pinned in tools/go.mod and invoked via `go tool` — no separate
    # install. GoReleaser runs the SBOM command with its working directory set
    # to dist/, hence the ../ on the modfile path.
    cmd: go
    args:
      - tool
      - -modfile=../tools/go.mod
      - syft
      - $artifact
      - --output
      - spdx-json=$document

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

# dockers_v2 builds a multi-arch manifest with buildx, reusing the binaries built
# above. On --snapshot it emits per-arch suffixed images for local testing instead.
dockers_v2:
  - id: myapp
    ids: [myapp]
    dockerfile: Dockerfile.goreleaser
    # Stage LICENSE into the build context so Dockerfile.goreleaser can COPY it.
    extra_files:
      - LICENSE
    images:
      - ghcr.io/OWNER/myapp
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    annotations:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "https://github.com/OWNER/REPO"

release:
  github:
    owner: OWNER
    name: REPO
